<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#ff92b2" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>💌 Sorpresa de Hoy 💌</title>
  <link rel="stylesheet" href="styles.css" />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&family=Sacramento:wght@400&family=Indie+Flower&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/luxon@3.4.4/build/global/luxon.min.js"></script>
</head>
<body>
  <div class="container">
    <header>
      <div class="header-content">
        <div class="title">💌 <span class="title-script">Sorpresa de Hoy  </span> 💌 </div>
        <div class="subtitle">Notas para mi niña, solo para ti, mi futura esposa ❤️‍🔥</div>
      </div>
      <div class="btns">
        <button class="ghost pill danger sm" id="resetBtn" title="Limpiar datos guardados si es necesario">
          <svg class="icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M3 6h18v2H3V6zm3 3h12l-1 11H7L6 9zM9 4h6l1 2H8l1-2z" fill="currentColor"/></svg>
          Restablecer
        </button>
      </div>
    </header>

    <section class="card">
      <div class="today" id="todayBox">
        <div class="tz-badge" id="tzBadge">Te quiero tanto que deseo morir antes que tú para no tener que soportar el dolor de perderte ❤️‍🔥</div>
        <div id="todayState" class="hint">Cargando…</div>
        <div class="time-panel" id="countdown" aria-live="polite">
          <div class="reveal-pill" id="revealTimeDisplay">Revelación —</div>
        </div>
        <div class="note" id="noteText"></div>
        <div class="today-actions">
          <button class="ghost pill sm" id="copyBtn">Copiar nota</button>
        </div>
        <div class="confetti" id="confetti"></div>
        <div class="hearts" id="hearts" aria-hidden="true"></div>
      </div>
      <div class="footer">
        Ojitos lindos, sonrisa hermosa, mis pecas. 
      </div>
    </section>
  </div>

  <script>
    const { DateTime } = luxon;
    const STORAGE_KEY = 'surpriseScheduler_v2'; // MATCHED TO INDEX.HTML

    // DOM
    const els = {
      tzBadge: document.getElementById('tzBadge'),
      todayState: document.getElementById('todayState'),
      countdown: document.getElementById('countdown'),
      revealTimeDisplay: document.getElementById('revealTimeDisplay'),
      noteText: document.getElementById('noteText'),
      copyBtn: document.getElementById('copyBtn'),
      resetBtn: document.getElementById('resetBtn'),
      confetti: document.getElementById('confetti'),
    };

    // Storage helpers
    const save = (data) => localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
    const load = () => { try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || null; } catch { return null; } };

    // Showers
    function showNote(entry, s, opts = {}){
      const text = (s.notes && s.notes[entry.noteIndex] != null) ? s.notes[entry.noteIndex] : '';
      els.noteText.textContent = text;
      els.noteText.style.display = 'block';

      const name = s.settings.partnerName || 'ti';
      if (opts.revealed){
        els.todayState.textContent = `¡Revelado para ${name}!`;
        if (entry.revealedAt){
          els.revealTimeDisplay.textContent = `Revelado · ${DateTime.fromISO(entry.revealedAt).toFormat('HH:mm')}`;
        } else {
          els.revealTimeDisplay.textContent = `Revelado`;
        }
        els.countdown.classList.add('revealed');
        els.noteText.classList.add('revealed-pop');
      } else {
        els.todayState.textContent = `Para ${name} 💌`;
        showCountdownPill(s);
        els.countdown.classList.remove('revealed');
      }
    }

    function showCountdownPill(s){
      const now = DateTime.now().setZone(s.settings.partnerTZ);
      const todayTarget = now.set({hour:s.settings.revealHour, minute:s.settings.revealMinute, second:0, millisecond:0});
      const target = (now > todayTarget) ? todayTarget.plus({days:1}) : todayTarget;
      const diff = target.diff(now, ['hours','minutes','seconds']).toObject();
      const hh = String(Math.floor(diff.hours||0)).padStart(2,'0');
      const mm = String(Math.floor(diff.minutes||0)).padStart(2,'0');
      const ss = String(Math.floor(diff.seconds||0)).padStart(2,'0');
      els.revealTimeDisplay.textContent = `En ${hh}:${mm}:${ss} — Revela ${target.toFormat('HH:mm')}`;
    }

    // Schedule helpers
    function ensureScheduleCovers(s, dateISO){
      if (!s || !s.schedule || !Array.isArray(s.schedule) || s.schedule.length === 0) return null;

      let entry = s.schedule.find(e => e.dateISO === dateISO);
      if (entry) return entry;

      const zone = s.settings.partnerTZ || 'UTC';
      let last = s.schedule[s.schedule.length - 1];
      let d = DateTime.fromISO(last.dateISO, {zone}).startOf('day');
      const target = DateTime.fromISO(dateISO, {zone}).startOf('day');

      if (target < DateTime.fromISO(s.schedule[0].dateISO, {zone}).startOf('day')) {
        return s.schedule[0];
      }

      let n = last.n || s.schedule.length;
      let nextNoteIndex = (typeof last.noteIndex === 'number') ? last.noteIndex + 1 : 0;
      const notesLen = Array.isArray(s.notes) ? s.notes.length : 0;

      while (d < target){
        d = d.plus({days:1});
        n += 1;
        const noteIndex = notesLen ? (nextNoteIndex % notesLen) : 0;
        nextNoteIndex += 1;

        const newEntry = {
          n,
          dateISO: d.toISODate(),
          noteIndex,
          revealed: false,
          revealedAt: null
        };
        s.schedule.push(newEntry);
        entry = newEntry;
      }
      save(s);
      return entry;
    }

    // Logic
    function tickCountdown(){
      const s = load();
      if(!s){ els.todayState.textContent = 'Esperando el horario…'; return; }

      const now = DateTime.now().setZone(s.settings.partnerTZ);
      const today = now.startOf('day').toISODate();
      const entry = ensureScheduleCovers(s, today);
      if (!entry) return;

      if (entry.revealed) {
        showNote(entry, s, {revealed:true});
      } else {
        showNote(entry, s, {revealed:false});
      }
    }

    function revealIfDue(){
      const s = load(); if(!s) return false;

      const now = DateTime.now().setZone(s.settings.partnerTZ);
      const today = now.startOf('day').toISODate();
      const entry = ensureScheduleCovers(s, today);
      if(!entry) return false;

      const dueTime = DateTime.fromISO(entry.dateISO, {zone:s.settings.partnerTZ})
        .set({hour:s.settings.revealHour, minute:s.settings.revealMinute, second:0, millisecond:0});

      const due = (!entry.revealed && now >= dueTime);

      if(due){
        entry.revealed = true;
        entry.revealedAt = now.toISO();
        save(s);
        showNote(entry, s, {revealed:true});
        fireConfetti(); fireHearts();
        return true;
      }

      showNote(entry, s, {revealed: entry.revealed});
      return true;
    }

    async function autoLoadScheduleFromJSON(){
      const existing = load(); if (existing) return;
      try {
        const res = await fetch('schedule.json?v=' + Date.now(), { cache: 'no-store' });
        if (!res.ok) { els.todayState.textContent = 'Horario no encontrado aún.'; return; }
        const obj = await res.json();
        if (obj && obj.settings && obj.notes && obj.schedule) {
          save(obj);
          revealIfDue();
        }
      } catch { els.todayState.textContent = 'Error al cargar el horario.'; }
    }

    // Confetti + helpers
    function fireConfetti(){
      const cont = els.confetti; cont.innerHTML = '';
      const colors = ['#ff6b9d','#c44569','#8e44ad','#a569bd','#ff7675'];
      for(let i=0;i<100;i++){
        const p = document.createElement('div'); p.className='p';
        p.style.left = Math.random()*100 + 'vw';
        const dur = 2 + Math.random()*2.5; p.style.animation = `fall ${dur}s linear forwards`;
        p.style.background = colors[i % colors.length];
        p.style.transform = `translateY(-30px) rotate(${Math.random()*360}deg)`;
        p.style.opacity = (0.8 + Math.random()*0.2).toFixed(2);
        p.style.borderRadius = Math.random() < .5 ? '2px' : '999px';
        cont.appendChild(p);
      }
      setTimeout(()=>{ cont.innerHTML=''; }, 5000);
    }

    function fireHearts(){
      const cont = document.getElementById('hearts'); if(!cont) return;
      const colors = ['#ff6b9d','#ff92b2','#ff5fa8','#ffd1d9'];
      const N = 18;
      for(let i=0;i<N;i++){
        const h = document.createElement('div'); h.className='heart';
        const left = 10 + Math.random()*80; h.style.left = left + '%';
        h.style.bottom = (6 + Math.random()*8) + '%';
        const dur = 1200 + Math.random()*1400;
        h.style.animation = `floatUp ${dur}ms cubic-bezier(.2,.9,.3,1) forwards`;
        const color = colors[Math.floor(Math.random()*colors.length)];
        h.innerHTML = `<svg viewBox="0 0 24 24" fill="${color}" aria-hidden="true"><path d="M12 21s-6.716-4.35-9.293-7.018C-1.08 10.077 2.41 6 6.5 6c2.31 0 3.98 1.47 4.5 2 .52-.53 2.19-2 4.5-2C21.59 6 23.08 10.08 21.293 13.982 18.716 16.65 12 21 12 21z"/></svg>`;
        cont.appendChild(h);
        setTimeout(()=>{ h.remove(); }, dur+250);
      }
    }

    function copyNote(){
      const txt = els.noteText.textContent?.trim();
      if(!txt){ alert('Aún no se ha revelado ninguna nota.'); return; }
      navigator.clipboard.writeText(txt).then(()=>{
        els.copyBtn.textContent = '¡Copiado!'; setTimeout(()=>els.copyBtn.textContent='Copiar nota', 1200);
      });
    }

    function resetAll(){
      if(!confirm('¿Limpiar el horario guardado en este dispositivo?')) return;
      localStorage.removeItem(STORAGE_KEY);
      els.noteText.style.display='none';
      els.todayState.textContent = 'Restablecimiento completo. Recargando…';
      setTimeout(()=>location.reload(), 400);
    }

    // Events
    els.copyBtn.addEventListener('click', copyNote);
    els.resetBtn.addEventListener('click', resetAll);

    // Add micro-icon SVGs
    (function decorateActionButtons(){
      const cp = document.getElementById('copyBtn');
      if(cp && !cp.querySelector('svg')){
        cp.insertAdjacentHTML('afterbegin', '<svg class="icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M16 1H4c-1.1 0-2 .9-2 2v14h2V3h12V1zm3 4H8c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h11c1.1 0 2-.9 2-2V7c0-1.1-.9-2-2-2zm0 16H8V7h11v14z"/></svg>');
      }
    })();

    // Init
    autoLoadScheduleFromJSON().then(()=>{ revealIfDue(); });
    (function loop(){ tickCountdown(); setTimeout(loop, 1000); })();
  </script>
</body>
</html>
